name: Global Edu Agent

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *' # 每天北京时间 06:00 (UTC 22:00)

jobs:
  run-agent:
    runs-on: ubuntu-latest
    
    # 必须显式声明写权限，否则最后的 git push 会报 403 错误
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install feedparser deep-translator

      - name: Execute
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python edu_ai.py

      - name: Sync History (Save memory)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 先创建文件，防止脚本没运行到保存步骤时，git add 找不到文件报错
          touch sent_history.txt daily_send_log.txt
          
          git add sent_history.txt daily_send_log.txt
          
          # 检查是否有内容变更
          if git diff --cached --quiet; then
            echo "No changes to history files. Skipping commit."
          else
            # [skip ci] 是核心，防止 commit 后再次触发 action 循环
            git commit -m "Update intelligence history [skip ci]"
            git push
          fi
